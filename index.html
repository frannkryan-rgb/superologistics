<!DOCTYPE html>
<html>
<head>
  <title>Supero Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d') no-repeat center/cover;
      color: white;
      margin: 0;
    }

    .box {
      background: rgba(0,0,0,0.7);
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
    }

    input {
      padding: 10px;
      width: 90%;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: #22c55e;
      color: white;
      border: none;
      width: 90%;
      cursor: pointer;
      border-radius: 5px;
    }

    #result {
      margin-top: 15px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🚚 Supero Logistics</h1>
<p>Fast & Reliable Delivery</p>

<div class="box">
  <h3>Track Package</h3>
  <input id="code" placeholder="Enter Tracking Code">
  <br>
  <button onclick="track()">Track</button>
  <p id="result"></p>
</div>

<!-- Firebase (COMPAT VERSION - more stable) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD8q05hAUlsoaE7KqXnlTx7U7T0roYkqoY",
    authDomain: "supero-logistics.firebaseapp.com",
    projectId: "supero-logistics"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function track() {
    let code = document.getElementById("code").value;

    if (!code) {
      document.getElementById("result").innerHTML = "Enter tracking code!";
      return;
    }

    db.collection("orders").doc(code).get()
      .then(doc => {
        if (doc.exists) {
          let d = doc.data();
          document.getElementById("result").innerHTML =
            "Name: " + d.name +
            "<br>Phone: " + d.phone +
            "<br>Address: " + d.address +
            "<br>Status: " + d.status;
        } else {
          document.getElementById("result").innerHTML = "Tracking code not found!";
        }
      })
      .catch(err => {
        document.getElementById("result").innerHTML = "Error loading data!";
        console.error(err);
      });
  }
</script>

<!-- WhatsApp -->
<a href="https://wa.me/447506072640" class="whatsapp">💬</a>

</body>
</html>
