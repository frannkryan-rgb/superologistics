<!DOCTYPE html>
<html>
<head>
  <title>Supero Logistics</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 5px;
    }

    button {
      padding: 10px;
      background: #22c55e;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🚚 Supero Logistics</h1>
<p>Fast & Reliable Delivery</p>

<!-- ADD CUSTOMER -->
<div class="box">
  <h3>Add Customer Order</h3>

  <input type="text" id="name" placeholder="Customer Name"><br>
  <input type="text" id="phone" placeholder="Phone Number"><br>
  <input type="text" id="address" placeholder="Delivery Address"><br>

  <button onclick="generateCode()">Generate Tracking Code</button>

  <p id="code"></p>
</div>

<!-- TRACK PACKAGE -->
<div class="box">
  <h3>Track Package</h3>

  <input type="text" id="trackingInput" placeholder="Enter Tracking Code"><br>

  <button onclick="trackPackage()">Track</button>

  <p id="result"></p>
</div>

<!-- VIEW ORDERS -->
<div class="box">
  <h3>View All Orders</h3>

  <button onclick="viewOrders()">View Orders</button>

  <div id="allOrders"></div>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8q05hAUlsoaE7KqXnlTx7U7T0roYkqoY",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics",
  storageBucket: "supero-logistics.appspot.com",
  messagingSenderId: "715603909286",
  appId: "1:715603909286:web:185ad07c875fa89d3b7267"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GENERATE TRACKING CODE
window.generateCode = async function () {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Please fill all fields");
    return;
  }

  let code = "SL" + Math.floor(1000 + Math.random() * 9000);

  await setDoc(doc(db, "orders", code), {
    name: name,
    phone: phone,
    address: address,
    status: "Processing"
  });

  document.getElementById("code").innerHTML = "Tracking Code: " + code;
};

// TRACK PACKAGE
window.trackPackage = async function () {
  let input = document.getElementById("trackingInput").value;

  const docRef = doc(db, "orders", input);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let data = docSnap.data();

    document.getElementById("result").innerHTML =
      "Name: " + data.name +
      "<br>Phone: " + data.phone +
      "<br>Address: " + data.address +
      "<br>Status: " + data.status;
  } else {
    document.getElementById("result").innerHTML = "Tracking code not found!";
  }
};

// VIEW ALL ORDERS
window.viewOrders = async function () {
  let output = "<h3>All Orders</h3>";

  const querySnapshot = await getDocs(collection(db, "orders"));

  querySnapshot.forEach((docItem) => {
    let data = docItem.data();

    output += `
      <div style="margin:10px; padding:10px; background:#eee;">
        <b>Code:</b> ${docItem.id}<br>
        <b>Name:</b> ${data.name}<br>
        <b>Phone:</b> ${data.phone}<br>
        <b>Address:</b> ${data.address}<br>
        <b>Status:</b> ${data.status}
      </div>
    `;
  });

  document.getElementById("allOrders").innerHTML = output;
};

</script>

</body>
</html>
