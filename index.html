<!DOCTYPE html>
<html>
<head>
  <title>Supero Logistics</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f0f4f8;
    }

    h1 {
      font-size: 38px;
      margin-top: 20px;
    }

    p {
      color: gray;
      font-size: 16px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    input {
      padding: 12px;
      width: 90%;
      margin: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      background: #22c55e;
      color: white;
      border: none;
      margin: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 90%;
      font-size: 16px;
    }

    button:hover {
      background: #16a34a;
    }

    .small-btn {
      width: auto;
      padding: 6px 10px;
      margin: 5px;
      font-size: 12px;
    }

    .delete-btn {
      background: red;
    }

    .delete-btn:hover {
      background: darkred;
    }

    /* WHATSAPP BUTTON */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<h1>🚚 Supero Logistics</h1>
<p>Fast, Secure & Reliable Delivery Services</p>

<!-- ADMIN LOGIN -->
<div class="box">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Enter Admin Password">
  <button onclick="login()">Login</button>
  <p id="loginStatus"></p>
</div>

<!-- ADD CUSTOMER -->
<div class="box" id="adminPanel" style="display:none;">
  <h3>Add Customer Order</h3>

  <input type="text" id="name" placeholder="Customer Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="text" id="address" placeholder="Delivery Address">

  <button onclick="generateCode()">Generate Tracking Code</button>

  <p id="code"></p>
</div>

<!-- TRACK PACKAGE -->
<div class="box">
  <h3>Track Package</h3>

  <input type="text" id="trackingInput" placeholder="Enter Tracking Code">

  <button onclick="trackPackage()">Track</button>

  <p id="result"></p>
</div>

<!-- VIEW ORDERS -->
<div class="box" id="ordersPanel" style="display:none;">
  <h3>View All Orders</h3>

  <button onclick="viewOrders()">View Orders</button>

  <div id="allOrders"></div>
</div>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/+447506072640" class="whatsapp" target="_blank">💬</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8q05hAUlsoaE7KqXnlTx7U7T0roYkqoY",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics",
  storageBucket: "supero-logistics.appspot.com",
  messagingSenderId: "715603909286",
  appId: "1:715603909286:web:185ad07c875fa89d3b7267"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.login = function () {
  let pass = document.getElementById("adminPass").value;

  if (pass === "Destiny_752005") {
    document.getElementById("loginStatus").innerHTML = "✅ Access Granted";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("ordersPanel").style.display = "block";
  } else {
    document.getElementById("loginStatus").innerHTML = "❌ Wrong Password";
  }
};

// GENERATE CODE
window.generateCode = async function () {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Please fill all fields");
    return;
  }

  let code = "SL" + Math.floor(1000 + Math.random() * 9000);

  await setDoc(doc(db, "orders", code), {
    name: name,
    phone: phone,
    address: address,
    status: "Processing"
  });

  document.getElementById("code").innerHTML = "Tracking Code: " + code;
};

// TRACK
window.trackPackage = async function () {
  let input = document.getElementById("trackingInput").value;

  const docRef = doc(db, "orders", input);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let data = docSnap.data();

    let color = "orange";
    if (data.status === "Delivered") color = "green";
    if (data.status === "In Transit") color = "blue";

    document.getElementById("result").innerHTML =
      "Name: " + data.name +
      "<br>Phone: " + data.phone +
      "<br>Address: " + data.address +
      "<br>Status: <b style='color:" + color + "'>" + data.status + "</b>";
  } else {
    document.getElementById("result").innerHTML = "Tracking code not found!";
  }
};

// VIEW ORDERS
window.viewOrders = async function () {
  let output = "<h3>All Orders</h3>";

  const querySnapshot = await getDocs(collection(db, "orders"));

  querySnapshot.forEach((docItem) => {
    let data = docItem.data();

    let color = "orange";
    if (data.status === "Delivered") color = "green";
    if (data.status === "In Transit") color = "blue";

    output += `
      <div style="margin:10px; padding:15px; background:white; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);">
        <b>Code:</b> ${docItem.id}<br>
        <b>Name:</b> ${data.name}<br>
        <b>Phone:</b> ${data.phone}<br>
        <b>Address:</b> ${data.address}<br>
        <b>Status:</b> <span style="color:${color}; font-weight:bold;">${data.status}</span><br><br>

        <button class="small-btn" onclick="updateStatus('${docItem.id}','Processing')">Processing</button>
        <button class="small-btn" onclick="updateStatus('${docItem.id}','In Transit')">In Transit</button>
        <button class="small-btn" onclick="updateStatus('${docItem.id}','Delivered')">Delivered</button>
        <button class="small-btn delete-btn" onclick="deleteOrder('${docItem.id}')">Delete</button>
      </div>
    `;
  });

  document.getElementById("allOrders").innerHTML = output;
};

// UPDATE STATUS
window.updateStatus = async function (id, newStatus) {
  await setDoc(doc(db, "orders", id), {
    status: newStatus
  }, { merge: true });

  alert("Status updated to " + newStatus);
  viewOrders();
};

// DELETE ORDER
window.deleteOrder = async function (id) {
  let confirmDelete = confirm("Delete this order?");

  if (confirmDelete) {
    await deleteDoc(doc(db, "orders", id));
    alert("Order deleted");
    viewOrders();
  }
};

</script>

</body>
</html>
