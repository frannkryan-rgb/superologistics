<!DOCTYPE html>
<html>
<head>
  <title>Supero worldwide Logistics</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d') no-repeat center center/cover;
      color: white;
    }

    .box {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 5px;
    }

    button {
      padding: 10px;
      background: #22c55e;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
    }

    /* Floating WhatsApp */
    .whatsapp-float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 20px;
      right: 20px;
      background-color: #25D366;
      color: white;
      font-size: 30px;
      border-radius: 50%;
      text-align: center;
      line-height: 60px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      z-index: 1000;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>🚚 Supero Logistics</h1>
  <img src="https://cdn-icons-png.flaticon.com/512/2920/2920256.png" width="80">

  <p>Fast & Reliable Delivery</p>

  <div class="box">
    <h3>Track Package</h3>
    <input type="text" id="trackingInput" placeholder="Enter Tracking Code">
    <br><br>
    <button onclick="trackPackage()">Track</button>

    <p id="result"></p>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8q05hAUlsoaE7KqXnlTx7U7T0roYkqoY",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics",
  storageBucket: "supero-logistics.firebasestorage.app",
  messagingSenderId: "715603909286",
  appId: "1:715603909286:web:185ad07c875fa89d3b7267"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.trackPackage = async function () {
  let input = document.getElementById("trackingInput").value;

  if (!input) {
    document.getElementById("result").innerHTML = "Enter tracking code!";
    return;
  }

  const docRef = doc(db, "orders", input);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let order = docSnap.data();

    document.getElementById("result").innerHTML =
      "Name: " + order.name +
      "<br>Phone: " + order.phone +
      "<br>Address: " + order.address +
      "<br>Status: " + order.status;
  } else {
    document.getElementById("result").innerHTML = "Tracking code not found!";
  }
};
  </script>

  <!-- Floating WhatsApp Button -->
  <a href="https://wa.me/+447506072640?text=Hello%20Supero%20Logistics%2C%20I%20want%20to%20make%20an%20inquiry." 
     class="whatsapp-float" target="_blank">
     💬
  </a>

</body>
</html>
