<!DOCTYPE html><html>
<head>
  <title>Supero Logistics</title>  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
      background-size: cover;
    }

    h1 {
      font-size: 38px;
      margin-top: 10px;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }

    p {
      color: #e5e7eb;
    }

    .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
    }

    input {
      padding: 12px;
      width: 90%;
      margin: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      background: #22c55e;
      color: white;
      border: none;
      margin: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 90%;
    }

    .small-btn {
      width: auto;
      padding: 6px 10px;
      margin: 5px;
    }

    .delete-btn {
      background: red;
    }

    .logo {
      width: 90px;
      margin-top: 20px;
    }
  </style></head><body><img src="https://via.placeholder.com/100x100?text=LOGO" class="logo"><h1>🚚 Supero Logistics</h1>
<p>Fast, Secure & Reliable Delivery Services</p><!-- ADMIN --><div class="box" id="adminPanel" style="display:none;">
  <h3>Add Customer Order</h3>  <input id="name" placeholder="Customer Name">
  <input id="phone" placeholder="Phone Number">
  <input id="address" placeholder="Address">
  <input id="weight" placeholder="Weight (kg)">
  <input id="fee" placeholder="Delivery Fee ($)"><button onclick="generateCode()">Generate</button>

  <p id="code"></p>
</div><!-- TRACK --><div class="box">
  <h3>Track Package</h3>
  <input id="trackingInput" placeholder="Tracking Code">
  <button onclick="trackPackage()">Track</button>
  <p id="result"></p>
</div><!-- ORDERS --><div class="box" id="ordersPanel" style="display:none;">
  <button onclick="viewOrders()">View Orders</button>
  <div id="allOrders"></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics"
});

const db = getFirestore(app);

// GENERATE
window.generateCode = async function () {
  let name = nameInput.value;
  let phone = phoneInput.value;
  let address = addressInput.value;
  let weight = weightInput.value;
  let fee = feeInput.value;

  if (!name || !phone || !address || !weight || !fee) return alert("Fill all");

  let code = "SL" + Math.floor(1000 + Math.random()*9000);

  await setDoc(doc(db,"orders",code),{
    name,phone,address,weight,fee,status:"Processing"
  });

  code.innerHTML = "Tracking Code: "+code;
};

// TRACK
window.trackPackage = async function () {
  let input = trackingInput.value.trim().toUpperCase();

  if (input === "DESTINY_752005") {
    adminPanel.style.display = "block";
    ordersPanel.style.display = "block";
    result.innerHTML = "Admin Access";
    return;
  }

  let snap = await getDoc(doc(db,"orders",input));

  if (!snap.exists()) return result.innerHTML="Not found";

  let d = snap.data();
  result.innerHTML = `
    ${d.name}<br>
    ${d.address}<br>
    ${d.weight}kg<br>
    $${d.fee}<br>
    ${d.status}
  `;
};

// VIEW
window.viewOrders = async function () {
  let q = await getDocs(collection(db,"orders"));
  let out="";

  q.forEach(docItem=>{
    let d=docItem.data();

    out+=`
    <div>
      ${docItem.id}<br>
      ${d.name}<br>
      ${d.status}<br>

      <button onclick="updateStatus('${docItem.id}','Processing')">P</button>
      <button onclick="updateStatus('${docItem.id}','In Transit')">T</button>
      <button onclick="updateStatus('${docItem.id}','Delivered')">D</button>

      <button onclick='printInvoice(${JSON.stringify(d)},"${docItem.id}")'>Invoice</button>

      <button onclick="deleteOrder('${docItem.id}')">X</button>
    </div>`;
  });

  allOrders.innerHTML=out;
};

// STATUS
window.updateStatus = async(id,s)=>{
  await setDoc(doc(db,"orders",id),{status:s},{merge:true});
  viewOrders();
};

// DELETE
window.deleteOrder = async(id)=>{
  await deleteDoc(doc(db,"orders",id));
  viewOrders();
};

// INVOICE
window.printInvoice = function(d,code){
  let w=window.open("");
  w.document.write(`
  <h2>Supero Logistics</h2>
  <p>${code}</p>
  <p>${d.name}</p>
  <p>${d.address}</p>
  <p>${d.weight}kg</p>
  <p>$${d.fee}</p>
  <p>${d.status}</p>
  <script>window.print()</script>`);
};

</script></body>
</html>
