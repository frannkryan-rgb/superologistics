<!DOCTYPE html>
<html>
<head>
  <title>Supero Logistics</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 5px;
    }

    button {
      padding: 10px;
      background: #22c55e;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🚚 Supero Logistics</h1>
<p>Fast & Reliable Delivery</p>

<!-- ADMIN: ADD ORDER -->
<div class="box">
  <h3>Add Customer Order (Admin)</h3>

  <input type="text" id="name" placeholder="Customer Name"><br>
  <input type="text" id="phone" placeholder="Phone Number"><br>
  <input type="text" id="address" placeholder="Address"><br>

  <button onclick="generateCode()">Generate Tracking Code</button>

  <p id="code"></p>
</div>

<!-- CUSTOMER: TRACK -->
<div class="box">
  <h3>Track Package</h3>

  <input type="text" id="trackingInput" placeholder="Enter Tracking Code"><br>

  <button onclick="trackPackage()">Track</button>

  <p id="result"></p>
</div>

<!-- ADMIN: VIEW ORDERS -->
<div class="box">
  <h3>All Orders (Admin)</h3>

  <button onclick="viewOrders()">View All Orders</button>

  <div id="allOrders"></div>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8q05hAUlsoaE7KqXnlTx7U7T0roYkqoY",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics",
  storageBucket: "supero-logistics.firebasestorage.app",
  messagingSenderId: "715603909286",
  appId: "1:715603909286:web:185ad07c875fa89d3b7267",
  measurementId: "G-CV5JKV0C05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ✅ GENERATE ORDER
window.generateCode = async function () {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Please fill all fields!");
    return;
  }

  let code = "SL" + Math.floor(Math.random() * 1000000);

  let order = {
    name,
    phone,
    address,
    status: "Processing"
  };

  await setDoc(doc(db, "orders", code), order);

  document.getElementById("code").innerHTML = "Tracking Code: " + code;
};


// ✅ TRACK PACKAGE
window.trackPackage = async function () {
  let input = document.getElementById("trackingInput").value;

  if (!input) {
    alert("Enter tracking code!");
    return;
  }

  const docRef = doc(db, "orders", input);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let order = docSnap.data();

    document.getElementById("result").innerHTML =
      "<b>Name:</b> " + order.name +
      "<br><b>Phone:</b> " + order.phone +
      "<br><b>Address:</b> " + order.address +
      "<br><b>Status:</b> " + order.status;
  } else {
    document.getElementById("result").innerHTML = "❌ Tracking code not found!";
  }
};


// ✅ VIEW ALL ORDERS
window.viewOrders = async function () {
  let output = "<h3>All Orders</h3>";

  const querySnapshot = await getDocs(collection(db, "orders"));

  querySnapshot.forEach((docSnap) => {
    let order = docSnap.data();

    output +=
      "<div style='margin:10px; padding:10px; background:#eee'>" +
      "<b>Code:</b> " + docSnap.id +
      "<br><b>Name:</b> " + order.name +
      "<br><b>Phone:</b> " + order.phone +
      "<br><b>Address:</b> " + order.address +
      "<br><b>Status:</b> " + order.status +
      "</div>";
  });

  document.getElementById("allOrders").innerHTML = output;
};

</script>

</body>
</html>
