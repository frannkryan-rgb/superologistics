 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (KEEP YOUR OWN VALUES)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics",
  storageBucket: "supero-logistics.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ GENERATE CODE
window.generateCode = async function () {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Fill all details");
    return;
  }

  let code = "SL" + Math.floor(1000 + Math.random() * 9000);

  await setDoc(doc(db, "orders", code), {
    name: name,
    phone: phone,
    address: address,
    status: "Processing"
  });

  document.getElementById("code").innerHTML = "Tracking Code: " + code;
};

// ✅ TRACK PACKAGE
window.trackPackage = async function () {
  let input = document.getElementById("trackingInput").value;

  const docRef = doc(db, "orders", input);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let data = docSnap.data();
    document.getElementById("result").innerHTML =
      "Name: " + data.name +
      "<br>Phone: " + data.phone +
      "<br>Address: " + data.address +
      "<br>Status: " + data.status;
  } else {
    document.getElementById("result").innerHTML = "Order not found";
  }
};

// ✅ VIEW ORDERS
window.viewOrders = async function () {
  let output = "<h3>All Orders</h3>";

  const querySnapshot = await getDocs(collection(db, "orders"));

  querySnapshot.forEach((doc) => {
    let data = doc.data();

    output += `
      <div style="margin:10px; padding:10px; background:#eee;">
        <b>Code:</b> ${doc.id}<br>
        <b>Name:</b> ${data.name}<br>
        <b>Phone:</b> ${data.phone}<br>
        <b>Address:</b> ${data.address}<br>
        <b>Status:</b> ${data.status}
      </div>
    `;
  });

  document.getElementById("allOrders").innerHTML = output;
};
    </script>
