<!DOCTYPE html>
<html>
<head>
  <title>Supero Logistics</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
      background-size: cover;
    }

    h1 {
      font-size: 38px;
      margin-top: 10px;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }

    p { color: #e5e7eb; }

    .box {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
    }

    input {
      padding: 12px;
      width: 90%;
      margin: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      background: #22c55e;
      color: white;
      border: none;
      margin: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 90%;
    }

    .small-btn { width:auto; padding:6px; font-size:12px; }
    .delete-btn { background:red; }
  </style>
</head>

<body>

<h1>🚚 Supero Logistics</h1>
<p>Fast, Secure & Reliable Delivery Services</p>

<!-- ADMIN -->
<div class="box" id="adminPanel" style="display:none;">
  <h3>Add Order</h3>
  <input id="name" placeholder="Customer Name">
  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">
  <button onclick="generateCode()">Generate Tracking Code</button>
  <p id="code"></p>
</div>

<!-- TRACK -->
<div class="box">
  <h3>Track Package</h3>
  <input id="trackingInput" placeholder="Enter Tracking Code">
  <button onclick="trackPackage()">Track</button>
  <p id="result"></p>
</div>

<!-- ORDERS -->
<div class="box" id="ordersPanel" style="display:none;">
  <h3>Orders</h3>
  <button onclick="viewOrders()">Load Orders</button>
  <div id="allOrders"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  getDocs,
  collection,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8q05hAUlsoaE7KqXnlTx7U7T0roYkqoY",
  authDomain: "supero-logistics.firebaseapp.com",
  projectId: "supero-logistics",
  storageBucket: "supero-logistics.appspot.com",
  messagingSenderId: "715603909286",
  appId: "1:715603909286:web:185ad07c875fa89d3b7267"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔐 SIMPLE ADMIN LOGIN */
window.trackPackage = async function () {
  let input = document.getElementById("trackingInput").value.trim().toUpperCase();

  let adminPass = "SUPERADMIN123";

  if (input === adminPass) {
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("ordersPanel").style.display = "block";
    document.getElementById("result").innerHTML = "🔓 Admin Access Granted";
    return;
  }

  const docRef = doc(db, "orders", input);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let data = docSnap.data();

    let color = data.status === "Delivered" ? "green"
              : data.status === "In Transit" ? "blue"
              : "orange";

    document.getElementById("result").innerHTML = `
      Name: ${data.name}<br>
      Phone: ${data.phone}<br>
      Address: ${data.address}<br>
      Status: <b style="color:${color}">${data.status}</b>
    `;
  } else {
    document.getElementById("result").innerHTML = "❌ Tracking code not found!";
  }
};

/* CREATE ORDER */
window.generateCode = async function () {
  let name = nameInput.value;
  let phone = phone.value;
  let address = address.value;

  if (!name || !phone || !address) return alert("Fill all fields");

  let code = "SL" + Math.floor(Math.random() * 9000 + 1000);

  await setDoc(doc(db, "orders", code), {
    name,
    phone,
    address,
    status: "Processing"
  });

  document.getElementById("code").innerText = "Tracking Code: " + code;
};

/* VIEW ORDERS */
window.viewOrders = async function () {
  let output = "";

  const snapshot = await getDocs(collection(db, "orders"));

  snapshot.forEach((docItem) => {
    let d = docItem.data();

    output += `
      <div style="background:#fff;margin:10px;padding:10px;border-radius:8px;">
        <b>${docItem.id}</b><br>
        ${d.name}<br>
        ${d.status}<br><br>

        <button class="small-btn" onclick="updateStatus('${docItem.id}','Processing')">Processing</button>
        <button class="small-btn" onclick="updateStatus('${docItem.id}','In Transit')">Transit</button>
        <button class="small-btn" onclick="updateStatus('${docItem.id}','Delivered')">Delivered</button>
        <button class="small-btn delete-btn" onclick="deleteOrder('${docItem.id}')">Delete</button>
      </div>
    `;
  });

  allOrders.innerHTML = output || "No orders found";
};

/* UPDATE STATUS */
window.updateStatus = async function (id, status) {
  await updateDoc(doc(db, "orders", id), { status });
  viewOrders();
};

/* DELETE ORDER */
window.deleteOrder = async function (id) {
  await deleteDoc(doc(db, "orders", id));
  viewOrders();
};

</script>

</body>
</html>
