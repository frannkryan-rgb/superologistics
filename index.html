<!DOCTYPE html>
<html>
<head>
  <title>Supero Logistics</title>
  <style>
    body { font-family: Arial; text-align: center; background: #0f172a; color: white; }
    .box { background: #1e293b; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
    button { padding: 10px; background: #22c55e; color: white; border: none; border-radius: 5px; }
    input { padding: 10px; width: 80%; }
  </style>
</head>

<body>

<h1>🚚 Supero Logistics</h1>
<p>Fast & Reliable Delivery in London</p>

<p>Same-day delivery • Safe & Secure • Affordable Rates</p>

<p>📍 Based in London, United Kingdom</p>
<p>📞 Available 24/7</p>

<button onclick="window.location.href='https://wa.me/+447506072640'">
Order Delivery Now
</button>

<div class="box">
  <h3>Generate Tracking Code</h3>
  <button onclick="generateCode()">Generate Code</button>
  <p id="code"></p>
</div>

<div class="box">
  <h3>Track Package</h3>
  <input type="text" id="trackInput" placeholder="Enter tracking code">
  <br><br>
  <button onclick="trackPackage()">Track</button>
  <p id="result"></p>
</div>

<script>
function generateCode() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (name === "" || phone === "" || address === "") {
    alert("Please fill all customer details!");
    return;
  }

  let code = "SL" + Math.floor(Math.random() * 100000);

  document.getElementById("code").innerHTML =
    "Tracking Code: " + code +
    "<br>Name: " + name +
    "<br>Phone: " + phone +
    "<br>Address: " + address;
}



function trackPackage() {
  let input = document.getElementById("trackInput").value;
  if(input.startsWith("SL")){
    document.getElementById("result").innerText = "Package is in transit 🚚";
  } else {
    document.getElementById("result").innerText = "Invalid tracking code ❌";
  }
}
</script>

</body>
</html>
